name: Deploy to cPanel (FTP)

# Csak a "deploy" ágra tolva fut le (a main-en nyugodtan dolgozhatsz),
# plusz kézzel is indíthatod a GitHub Actions fülön ("Run workflow").
on:
  push:
    branches: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.4 beállítása
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, dom, curl, fileinfo, xml, bcmath, intl, gd, zip
          coverage: none

      - name: Ideiglenes .env a buildhez (NEM kerül fel a szerverre)
        run: |
          cp .env.example .env
          php -r '$k="base64:".base64_encode(random_bytes(32)); $c=preg_replace("/^APP_KEY=.*/m","APP_KEY=$k",file_get_contents(".env")); file_put_contents(".env",$c);'

      - name: Composer függőségek (production, dev nélkül)
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Node 20 beállítása
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Vite assetek buildelése
        run: |
          npm ci
          npm run build

      - name: Felesleges vendor fordítások törlése (csak en, hu, ro marad)
        shell: bash
        run: |
          before=$(find vendor -type f | wc -l)
          mapfile -t dirs < <(find vendor -regextype posix-extended -type d -regex '.*/(resources/lang|lang|translations)/[^/]+')
          for d in "${dirs[@]}"; do
            name="$(basename "$d")"
            case "$name" in
              en|hu|ro) continue ;;
            esac
            # csak nyelvi kód nevű mappákat töröljük (pl. ko, de, pt_BR, zh-CN)
            if [[ "$name" =~ ^[a-z]{2}([_-][A-Za-z0-9]+)?$ ]]; then
              rm -rf "$d"
            fi
          done
          after=$(find vendor -type f | wc -l)
          echo "vendor fájlok: $before -> $after (megtartott nyelvek: en, hu, ro)"

      - name: Fejlesztői maradványok törlése
        run: rm -f public/hot

      - name: Feltöltés FTP-vel a szerverre
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # A dedikált FTP-fiók gyökere maga a "fogaszat_app" mappa,
          # ezért ide "./" kerül. (Ha a FŐ cPanel-fiókot használnád,
          # akkor írd át erre: server-dir: fogaszat_app/ )
          server-dir: ./
          local-dir: ./
          # SOHA ne töltse fel ezeket – különben letörölné az éles adatokat:
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .claude/**
            .vscode/**
            .env
            .env.*
            database/database.sqlite
            storage/**
            public/storage/**
            public/.htaccess
            public/favicon.ico
            tests/**
            phpunit.xml
            serve.bat
            *.md
